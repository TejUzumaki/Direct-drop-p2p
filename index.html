<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Test Lobby</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; }
  .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
  .panel { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #444; }
  h2 { margin-top: 0; color: #90ee90; }
  input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; box-sizing: border-box; }
  button { padding: 10px 15px; border: none; border-radius: 4px; background: #90ee90; color: #111; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
  button:hover { background: #aaffaa; }
  button:disabled { background: #555; color: #999; cursor: not-allowed; }
  #chatBox { height: 200px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid #444; margin-bottom: 10px; }
  .msg { margin-bottom: 8px; }
  .msg span { font-weight: bold; color: #ffcc44; }
  .system { color: #888; font-style: italic; }
  #status { text-align: center; font-weight: bold; color: #ff4444; }
  .id-display { display: flex; align-items: center; gap: 10px; background: #333; padding: 10px; border-radius: 4px; margin-bottom: 10px; word-break: break-all; }
  .copy-btn { width: auto; margin: 0; padding: 5px 10px; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
  <div class="panel">
    <h2>1. Connection</h2>
    <div id="status">Initializing...</div>
    <br>
    <div class="id-display">
      <strong>Your ID:</strong> <span id="myId">Loading...</span>
      <button class="copy-btn" onclick="copyId()">Copy</button>
    </div>
    <input type="text" id="connectId" placeholder="Paste Friend's ID here...">
    <button id="connectBtn" onclick="connectToPeer()" disabled>Connect to Friend</button>
  </div>

  <div class="panel">
    <h2>2. Voice & Chat</h2>
    <div id="chatBox">
      <div class="msg system">Chat will appear here once connected...</div>
    </div>
    <input type="text" id="messageInput" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()" disabled>
    <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    <br><br>
    <button id="muteBtn" onclick="toggleMute()" disabled>Mute Mic</button>
  </div>
</div>

<!-- Hidden audio element to play incoming voice -->
<audio id="remoteAudio" autoplay></audio>

<!-- PeerJS Library -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  let peer;
  let conn;
  let localStream;
  let isMuted = false;
  let currentCall = null;

  const myIdEl = document.getElementById('myId');
  const statusEl = document.getElementById('status');
  const connectBtn = document.getElementById('connectBtn');
  const sendBtn = document.getElementById('sendBtn');
  const muteBtn = document.getElementById('muteBtn');
  const messageInput = document.getElementById('messageInput');
  const chatBox = document.getElementById('chatBox');
  const remoteAudio = document.getElementById('remoteAudio');

  // 1. Initialize Peer (Requests access to the free PeerJS signaling server)
  peer = new Peer();

  peer.on('open', (id) => {
    myIdEl.textContent = id;
    statusEl.textContent = 'Ready! Share your ID with a friend.';
    statusEl.style.color = '#90ee90';
    connectBtn.disabled = false;
  });

  // 2. Handle Incoming Data Connection (Text Chat)
  peer.on('connection', (dataConn) => {
    conn = dataConn;
    setupChat();
  });

  // 3. Handle Incoming Media Connection (Voice Chat)
  peer.on('call', (call) => {
    currentCall = call;
    // Answer the call with our local microphone stream
    call.answer(localStream);
    call.on('stream', (remoteStream) => {
      remoteAudio.srcObject = remoteStream;
      appendMessage('System', 'Voice connected!');
    });
  });

  peer.on('error', (err) => {
    console.error(err);
    statusEl.textContent = 'Error: ' + err.type;
    statusEl.style.color = '#ff4444';
  });

  // Function to connect to a friend
  function connectToPeer() {
    const friendId = document.getElementById('connectId').value.trim();
    if (!friendId) return;

    statusEl.textContent = 'Connecting...';
    
    // Get our microphone first
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        localStream = stream;
        
        // Establish Data Connection
        conn = peer.connect(friendId);
        setupChat();

        // Establish Media (Voice) Connection
        currentCall = peer.call(friendId, localStream);
        currentCall.on('stream', (remoteStream) => {
          remoteAudio.srcObject = remoteStream;
        });
      })
      .catch(err => {
        alert("Microphone access denied. Voice chat won't work, but text will.");
        // Proceed with text only if mic fails
        conn = peer.connect(friendId);
        setupChat();
      });
  }

  // Setup chat UI once connected
  function setupChat() {
    conn.on('open', () => {
      statusEl.textContent = 'Connected!';
      statusEl.style.color = '#90ee90';
      sendBtn.disabled = false;
      messageInput.disabled = false;
      muteBtn.disabled = false;
      appendMessage('System', 'Connected to peer!');
    });

    conn.on('data', (data) => {
      appendMessage('Friend', data);
    });

    conn.on('close', () => {
      appendMessage('System', 'Friend disconnected.');
      sendBtn.disabled = true;
      messageInput.disabled = true;
      muteBtn.disabled = true;
    });
  }

  function sendMessage() {
    const msg = messageInput.value.trim();
    if (msg && conn && conn.open) {
      conn.send(msg);
      appendMessage('You', msg);
      messageInput.value = '';
    }
  }

  function toggleMute() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks()[0].enabled = !isMuted;
    muteBtn.textContent = isMuted ? 'Unmute Mic' : 'Mute Mic';
  }

  function appendMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'msg';
    if (sender === 'System') div.classList.add('system');
    div.innerHTML = sender === 'System' ? text : `<span>${sender}:</span> ${text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function copyId() {
    const text = myIdEl.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }
</script>
</body>
</html>
